name: Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: build & test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Swift 6.3
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.3"

      - name: Build
        run: swift build

      - name: Test
        run: swift test
