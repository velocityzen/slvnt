name: Lint

on:
  push:
    branches: [main]
    paths:
      - "**/*.swift"
      - "Package.swift"
      - "Package.resolved"
  pull_request:
    paths:
      - "**/*.swift"
      - "Package.swift"
      - "Package.resolved"

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: swift-format
    runs-on: macos-15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Swift 6.2
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: swift format lint
        run: swift format lint --strict --recursive --configuration .swift-format Sources Tests Package.swift
